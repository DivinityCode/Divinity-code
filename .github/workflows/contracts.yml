name: Contracts Validation

on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Validate contract schemas and examples
        run: npm run validate:contracts
